<div class="toast-stack" aria-live="polite" aria-relevant="additions text">
  <div
    *ngFor="let item of (toast.toasts$ | async) ?? []; trackBy: trackToast"
    [@toast]
    class="toast"
    [class.toast-success]="item.variant === 'success'"
    [class.toast-error]="item.variant === 'error'"
    role="status"
  >
    <span class="toast-icon" aria-hidden="true">
      <svg *ngIf="item.variant === 'success'" viewBox="0 0 24 24" focusable="false">
        <path
          fill="currentColor"
          d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm5 8.2-6.3 6.3a1 1 0 0 1-1.4 0l-3.1-3a1 1 0 1 1 1.4-1.4l2.4 2.3 5.6-5.6a1 1 0 1 1 1.4 1.4z"
        />
      </svg>
      <svg *ngIf="item.variant === 'error'" viewBox="0 0 24 24" focusable="false">
        <path
          fill="currentColor"
          d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14h-2v-2h2zm0-4h-2V7h2z"
        />
      </svg>
    </span>
    <p class="toast-message">{{ item.message }}</p>
    <button type="button" class="toast-dismiss" (click)="toast.dismiss(item.id)" aria-label="Dismiss notification">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path
          fill="currentColor"
          d="M18.3 5.71 12 12l6.3 6.29-1.42 1.42L10.59 13.4 4.29 19.7 2.88 18.3 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"
        />
      </svg>
    </button>
  </div>
</div>
